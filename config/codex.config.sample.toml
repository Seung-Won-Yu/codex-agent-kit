#:schema https://developers.openai.com/codex/config-schema.json

# Portable quality-first base. Machine paths and project trust are added by Codex
# on the target computer, while this file owns the shared operating defaults.
model = "gpt-5.6-sol"
model_reasoning_effort = "high"
sandbox_mode = "danger-full-access"
personality = "pragmatic"

[features]
goals = true
multi_agent = true
tool_suggest = true
skill_mcp_dependency_install = true

[agents]
max_threads = 4
max_depth = 1

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."pdf@openai-primary-runtime"]
enabled = true

[plugins."template-creator@openai-primary-runtime"]
enabled = true

[plugins."sites@openai-bundled"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[plugins."chrome@openai-bundled"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."visualize@openai-bundled"]
enabled = true

[desktop]
ambient-suggestions-enabled = true
conversationDetailMode = "STEPS_COMMANDS"
followUpQueueMode = "queue"
dock-icon-preference = "codex-system"
enabled-reasoning-efforts = ["low", "medium", "high", "xhigh", "ultra"]

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"
