#:schema https://developers.openai.com/codex/config-schema.json

# Redacted sample based on the active local Codex setup.
# Replace model names, paths, hashes, and project roots for your own machine.

model = "gpt-5.5"
model_reasoning_effort = "xhigh"

service_tier = "default"
sandbox_mode = "danger-full-access"

[features]
goals = true
unified_exec = true
shell_tool = true
multi_agent = true
shell_snapshot = true
tool_suggest = true
skill_mcp_dependency_install = true
js_repl = false

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."notion@openai-curated"]
enabled = true

[plugins."pdf@openai-primary-runtime"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[plugins."template-creator@openai-primary-runtime"]
enabled = true

[projects."/path/to/your/workspace"]
trust_level = "trusted"

[desktop]
ambient-suggestions-enabled = true
conversationDetailMode = "STEPS_COMMANDS"

[mcp_servers.node_repl]
args = []
command = "/path/to/Codex.app/Contents/Resources/cua_node/bin/node_repl"
startup_timeout_sec = 120

[mcp_servers.node_repl.env]
CODEX_HOME = "/path/to/.codex"
NODE_REPL_NATIVE_PIPE_CONNECT_TIMEOUT_MS = "1000"
NODE_REPL_NODE_MODULE_DIRS = "/path/to/Codex.app/Contents/Resources/cua_node/lib/node_modules"
NODE_REPL_NODE_PATH = "/path/to/Codex.app/Contents/Resources/cua_node/bin/node"
NODE_REPL_TRUSTED_CODE_PATHS = "/path/to/.codex"
BROWSER_USE_AVAILABLE_BACKENDS = "chrome,iab"
NODE_REPL_INSTRUCTIONS_USE_CASE_BROWSER = "Control the in-app browser in conjunction with the Browser Plugin."
NODE_REPL_INSTRUCTIONS_USE_CASE_CHROME = "Control the Chrome browser in conjunction with the Chrome Plugin. Prefer this method of controlling Chrome over alternatives unless the user explicitly mentions an alternative."
BROWSER_USE_CODEX_APP_BUILD_FLAVOR = "prod"
BROWSER_USE_CODEX_APP_VERSION = "replace-with-installed-version"
CODEX_CLI_PATH = "/path/to/Codex.app/Contents/Resources/codex"
